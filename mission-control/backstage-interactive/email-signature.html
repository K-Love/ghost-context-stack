<!DOCTYPE html>
<html>
<head>
<style>
  .sig-container { font-family: 'Helvetica', 'Arial', sans-serif; color: #1a1a1a; line-height: 1.5; }
  .name { font-size: 18px; font-weight: bold; margin-bottom: 4px; color: #000; }
  .title { font-size: 14px; color: #666; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .logo-link img { width: 180px; height: auto; margin-bottom: 12px; display: block; }
  .social-links { font-size: 13px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
  .social-links a { color: #17a398; text-decoration: none; font-weight: 600; margin-right: 15px; }
  .social-links a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="sig-container">
    <div class="name">Kevin Love</div>
    <div class="title">Founder | Backstage Interactive</div>
    
    <!-- Using a placeholder until the site is fully propped so the image renders properly in Zoho -->
    <a href="https://backstageinteractive.com" class="logo-link">
      <img src="https://backstageinteractive.com/images/bi-logo.png" alt="Backstage Interactive">
    </a>

    <div class="social-links">
      <a href="https://x.com/iamklove">X (Twitter)</a>
      <!-- <a href="#">YouTube (Coming Soon)</a> -->
      <a href="https://backstageinteractive.com">Website</a>
    </div>
  </div>
</body>
</html>
