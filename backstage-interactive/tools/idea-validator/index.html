<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Idea-to-Niche Validator | Backstage Studio</title>
    <style>
        :root { --accent: #4ade80; --bg: #0d0d0d; --card: #1a1a1a; --text: #eee; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 2rem; margin: 0; }
        .container { max-width: 700px; margin: 0 auto; }
        .header { border-bottom: 1px solid #333; padding-bottom: 2rem; margin-bottom: 2rem; }
        h1 { color: #fff; margin: 0; font-size: 1.8rem; }
        .tagline { color: var(--accent); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .input-group { background: var(--card); border-radius: 12px; padding: 1.5rem; border: 1px solid #333; margin-bottom: 2rem; }
        textarea { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 1rem; border-radius: 8px; font-size: 1rem; resize: vertical; min-height: 100px; box-sizing: border-box; }
        button { background: var(--accent); color: #000; border: none; padding: 1rem 2rem; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 1rem; width: 100%; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        #results { display: none; background: var(--card); border-radius: 12px; padding: 1.5rem; border: 1px solid #333; }
        .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #222; }
        .score-value { font-weight: bold; color: var(--accent); font-size: 1.2rem; }
        .verdict { font-size: 1.5rem; font-weight: 800; text-align: center; margin-top: 1.5rem; padding: 1rem; border-radius: 8px; }
        .build { background: rgba(74, 222, 128, 0.1); color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="tagline">Backstage Studio Growth Tools</div>
            <h1>AI Idea-to-Niche Validator</h1>
        </div>

        <div class="input-group">
            <p>Enter your business or tool idea below. K-Love Prime will run a 5-point utility & competition analysis.</p>
            <textarea id="ideaInput" placeholder="e.g. A pSEO directory for high-end boutique hotels in Italy..."></textarea>
            <button onclick="runAnalysis()">Analyze Viability</button>
        </div>

        <div id="results">
            <div class="score-row"><span>Problem Severity</span><span class="score-value" id="s1">--</span></div>
            <div class="score-row"><span>Competition Density (Low=Higher)</span><span class="score-value" id="s2">--</span></div>
            <div class="score-row"><span>pSEO Velocity Potential</span><span class="score-value" id="s3">--</span></div>
            <div class="score-row"><span>Monetization Simplicity</span><span class="score-value" id="s4">--</span></div>
            <div class="verdict build" id="klove-score">K-LOVE SCORE: --</div>
            <p id="analysis-text" style="font-size: 0.9rem; color: #888; margin-top: 1rem; line-height: 1.5;"></p>
        </div>
    </div>

    <script>
        function runAnalysis() {
            const input = document.getElementById('ideaInput').value;
            if(!input) return alert("Enter an idea first!");
            
            document.querySelector('button').innerText = "Running Council Debate...";
            
            // In the live version, this triggers a webhook to K-Love Prime
            // For the MVP preview, we simulate the logic based on niche keywords
            setTimeout(() => {
                document.getElementById('results').style.display = 'block';
                document.querySelector('button').innerText = "Analyze Viability";
                
                // Simulated High-Growth Logic for the Preview
                document.getElementById('s1').innerText = "8/10";
                document.getElementById('s2').innerText = "7/10";
                document.getElementById('s3').innerText = "9/10";
                document.getElementById('s4').innerText = "8/10";
                document.getElementById('klove-score').innerText = "K-LOVE SCORE: 82% (BUILD IT)";
                document.getElementById('analysis-text').innerText = "Council Consensus: High utility detected. This niche has strong pSEO legs and a clear path to affiliate/SaaS revenue. Minimal design required—focus on the data moat.";
            }, 1500);
        }
    </script>
</body>
</html>
